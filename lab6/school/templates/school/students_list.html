{% extends "base.html" %}

{% block content %}
<h2>Students</h2>
<a href="{% url 'student_create' %}">Create Student</a>
<ul>
    {% for student in students %}
        <li>
            {{ student.name }} - {{ student.email }} - Age: {{ student.age }}
            <a href="{% url 'student_update' student.pk %}">Edit</a>
            <a href="{% url 'student_delete' student.pk %}">Delete</a>
        </li>
    {% empty %}
        <li>No students yet.</li>
    {% endfor %}
</ul>
{% endblock %}
